# nfpm.yaml — Borgee Helper .deb recipe (#1003).
#
# Used by .github/workflows/release-helper.yml to package the helper daemon
# + claim CLI + systemd unit into an installable .deb. Architecture (amd64/
# arm64) is parameterized via the NFPM_ARCH env var so a single config file
# drives both the linux-amd64 and linux-arm64 build jobs.
#
# The VERSION env var is required at build time and is typically derived from
# the git tag (borgee-helper-vX.Y.Z) or `workflow_dispatch` input. Local
# manual builds: see install/PACKAGING.md for the canonical command.

name: borgee-helper
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Borgee Engineering <noreply@borgee.io>
description: |
  Borgee Helper — host-side privileged daemon for OpenClaw runtime install
  and control. Talks to the Borgee server over an authenticated heartbeat
  channel and exposes a sandboxed local UDS to the in-host install butler.
homepage: https://github.com/codetreker/borgee
license: proprietary

contents:
  - src: ./cmd/borgee-helper/borgee-helper
    dst: /usr/local/bin/borgee-helper
    file_info:
      mode: 0755
      owner: root
      group: root
  - src: ./cmd/borgee-helper-claim/borgee-helper-claim
    dst: /usr/local/bin/borgee-helper-claim
    file_info:
      mode: 0755
      owner: root
      group: root
  - src: ./install/borgee-helper.service
    dst: /etc/systemd/system/borgee-helper.service
    file_info:
      mode: 0644
      owner: root
      group: root

scripts:
  preinstall: ./install/scripts/preinstall.sh
  postinstall: ./install/scripts/postinstall.sh
  preremove: ./install/scripts/preremove.sh

# Don't auto-start the daemon — operator must claim first (postinstall prints
# the next-step command). See install/PACKAGING.md "Why no auto-start".
