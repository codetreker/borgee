name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to test environment'
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: default/borgee
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build and push (Go server)
        run: |
          docker build \
            -f packages/server-go/Dockerfile \
            --build-arg VITE_AGENT_WS_SERVER=wss://testing-borgee.codetrek.cn \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:test \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:test

      - name: Deploy test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/dockers/borgee-test
            # On the server, docker-compose.yml and .env are managed manually.
            # This workflow no longer writes inline compose overrides or injects
            # environment entries, matching staging and production. Runtime
            # variables come from /opt/dockers/borgee-test/.env.
            #
            # Remove leftover containers before deployment (#660 + #661).
            # --force-recreate only affects containers tracked by compose, but
            # servers can also have same-name containers with mismatched project
            # names or missing labels. Use two cleanup layers:
            # 1) compose down: remove compose-tracked services and orphans.
            # 2) docker rm -f: remove same-name containers compose does not own.
            # `|| true` keeps the normal "no container exists" case from failing
            # under set -e. Real Docker daemon failures are still caught by the
            # later pull or up command.
            docker compose down --remove-orphans 2>/dev/null || true
            docker rm -f borgee-test 2>/dev/null || true
            docker compose pull || (echo "❌ docker compose pull failed (network / harbor)" && exit 1)
            docker compose up -d --force-recreate --remove-orphans
            sleep 5
            # Fail loudly if the running container image differs from the pulled
            # image (#660). This prevents `up -d` from silently keeping an older
            # image, which #658 observed in testing for five days.
            RUNNING_SHA=$(docker inspect borgee-test --format='{{.Image}}' 2>/dev/null) || (echo "❌ docker inspect borgee-test failed" && exit 1)
            PULLED_SHA=$(docker inspect --type=image cr.codetrek.work/default/borgee:test --format='{{.Id}}' 2>/dev/null) || (echo "❌ docker inspect image failed" && exit 1)
            if [ "$RUNNING_SHA" != "$PULLED_SHA" ]; then
              echo "❌ container running stale image: $RUNNING_SHA != $PULLED_SHA"
              exit 1
            fi
            # Match deploy.yml staging/prod: log StartedAt so reviewers can see
            # that the container was recreated for this deployment.
            UPTIME=$(docker inspect --format '{{.State.StartedAt}}' borgee-test 2>/dev/null || echo "")
            if [ -n "$UPTIME" ]; then echo "Container started at: $UPTIME"; fi
            curl -sf http://localhost:4902/health > /dev/null && echo "✅ Test healthy ($RUNNING_SHA)" || (echo "❌ Test unhealthy" && exit 1)
            docker image prune -f
