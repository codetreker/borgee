name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client build

  client-vitest:
    # REG-RT0-006 et al: client-side vitest. Runs in jsdom (see
    # packages/client/vitest.config.ts) so window-dispatching tests
    # like ws-invitation.test.ts actually execute. Was previously
    # absent from CI entirely, so a passing CI run did not prove these
    # tests had executed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client test

  go-test-race:
    # CI-SPLIT-RACE-COV: race-only job, no coverage. Pure data-race signal —
    # fail-fast for goroutine bugs without coverage's race-flake.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with race detector (no coverage)
        # CI race budget: keep this 180s timeout byte-identical with the
        # go-test-race-heavy sub-job. Issue #649 showed the previous 120s
        # budget could fail from legitimate runtime cost rather than a leaked
        # goroutine: the race detector is roughly 3x slower, cold Ubuntu CI
        # runners add build and toolchain warmup time, and the API suite is large.
        #
        # Coverage quality is not hidden by this timeout. Coverage thresholds
        # are enforced by go-test-cov, while race regressions remain visible
        # through stack dumps, data-race reports, and overall job runtime.
        run: cd packages/server-go && go test -tags sqlite_fts5 -timeout=180s -race ./...

  go-test-race-heavy:
    # TEST-FIX-3: isolated race-heavy sub-job for files guarded by the
    # `//go:build race_heavy` tag. TestClosedStoreInternalErrorBranches has
    # 11 serialized sub-tests, so it needs a separate time budget instead of
    # stretching the main go-test-race job.
    #
    # Root-cause note: #608 TEST-FIX-2 fixed the goroutine leak, but the main
    # race job still approached the old 120s timeout because these race-heavy
    # sub-tests were concentrated there. Isolating them kept the main path
    # stable while preserving the race-heavy coverage.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run race-heavy tests (build tag race_heavy)
        run: cd packages/server-go && go test -tags 'sqlite_fts5 race_heavy' -timeout=180s -race -run TestClosedStoreInternalErrorBranches ./internal/api/...

  go-test-cov:
    # CI-SPLIT-RACE-COV: coverage-only job, no race. Deterministic coverage
    # value — race detector affects goroutine scheduling, which makes some
    # defer/panic branches hit non-deterministically (e.g. ws/hub.go::
    # StartHeartbeat 33.3% no-race vs 58.3% with-race), bleeding into
    # coverage % flakes ±0.1%. Replaces the legacy `go-test` job; ruleset
    # required-checks should reference both `go-test-race` + `go-test-cov`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests + coverage analysis
        # Coverage policy lives in packages/server-go/.go-cov.toml and is shared
        # with local precheck. CI only supplies runtime settings such as the
        # output profile path.
        #
        # Coverage policy: do not lower the threshold. The measured 85.2% result
        # is produced by deterministic coverage additions and does not depend on
        # scheduler variance in CI.
        env:
          CI: "true"
          COVERPROFILE: "coverage.out"
        run: cd packages/server-go && go run github.com/codetreker/go-cov/cmd/go-cov@v0.1.0

  bpp-envelope-lint:
    # BPP-1 (#274/#280) envelope CI lint for G2.6 enforcement.
    # Pins 5 invariants (byte-identical with RT-0 #237, direction lock
    # control 6 / data 3, frame whitelist closure, godoc anchor) +
    # reverse-grep guard against unintended full-replay defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run BPP-1 envelope lint
        run: ./scripts/lint-bpp-envelope.sh

  e2e:
    # INFRA-2: Playwright dual-server smoke. Boots server-go (4901) + vite (5174)
    # via playwright.config webServer. CI keeps per-file ordering deterministic
    # while allowing multiple spec files to run at once.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borgee/e2e --filter @borgee/client
      - name: Install Playwright chromium
        run: pnpm --filter @borgee/e2e exec playwright install chromium
      - name: Cache server-go e2e binary
        id: server-e2e-bin-cache
        uses: actions/cache@v4
        with:
          path: packages/server-go/bin/collab-e2e
          key: server-go-e2e-bin-${{ runner.os }}-${{ runner.arch }}-go1.25-libsqlite3-${{ hashFiles('packages/server-go/go.mod', 'packages/server-go/go.sum', 'packages/server-go/**/*.go') }}
      - name: Install libsqlite3 headers
        if: steps.server-e2e-bin-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsqlite3-dev
      - name: Pre-fetch server-go modules
        if: steps.server-e2e-bin-cache.outputs.cache-hit != 'true'
        run: cd packages/server-go && go mod download
      - name: Build server-go e2e binary
        if: steps.server-e2e-bin-cache.outputs.cache-hit != 'true'
        run: cd packages/server-go && go build -tags 'sqlite_fts5 libsqlite3' -o bin/collab-e2e ./cmd/collab
      - name: Ensure server-go e2e binary is executable
        run: chmod +x packages/server-go/bin/collab-e2e
      - name: Run E2E
        env:
          E2E_CI_WORKERS: "4"
          E2E_SERVER_COMMAND: ./bin/collab-e2e
          E2E_TRACE_MODE: on-first-retry
          E2E_VIDEO_MODE: on-first-retry
        run: pnpm --filter @borgee/e2e exec playwright test --project=chromium --fail-on-flaky-tests
      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  e2e-remote-node:
    # Dedicated VM-dependent e2e: the remote-node browse spec (ls/read/stat
    # through the real UI against a borgee daemon running inside a privileged
    # systemd dev-vm container). Separate from the vanilla `e2e` job because it
    # needs the dev-vm image + a privileged container; the vanilla job runs
    # VM-less (--project=chromium). REQUIRED check (gates the PR) — runs for
    # real or fails loud; NO silent skip.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: packages/server-go/go.sum
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borgee/e2e --filter @borgee/client
      - name: Install Playwright chromium
        run: pnpm --filter @borgee/e2e exec playwright install chromium
      - name: Install libsqlite3 headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsqlite3-dev
      - name: Build server-go e2e binary
        run: cd packages/server-go && go build -tags 'sqlite_fts5 libsqlite3' -o bin/collab-e2e ./cmd/collab
      - name: Ensure server-go e2e binary is executable
        run: chmod +x packages/server-go/bin/collab-e2e
      - name: Build dev-vm image (packs t4 tarball + docker build)
        # scripts/dev-vm/build-image.sh: cross-compile platform binaries ->
        # pnpm pack the @codetreker/borgee-remote-agent tarball into the build
        # context -> docker build borgee-vm-base:latest (COPY + npm install -g +
        # a build-time `borgee-remote-agent --version` smoke). A bare compose
        # build would fail at the COPY — the wrapper is mandatory.
        run: timeout 600 bash scripts/dev-vm/build-image.sh
      - name: Run remote-node VM e2e
        env:
          E2E_SERVER_COMMAND: ./bin/collab-e2e
          E2E_TRACE_MODE: on-first-retry
          E2E_VIDEO_MODE: on-first-retry
        # The spec's beforeAll brings up the dev-vm (compose up -d) + seeds the
        # fixture; afterAll tears it down. ONLY the VM spec runs here.
        run: timeout 600 pnpm --filter @borgee/e2e exec playwright test --project=remote-node-vm --fail-on-flaky-tests
      - name: Tear down dev-vm (always)
        if: always()
        run: docker compose -f scripts/dev-vm/docker-compose.yml -f scripts/dev-vm/docker-compose.e2e.yml down -v || true
      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-remote-node
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
