name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client build

  client-vitest:
    # REG-RT0-006 et al: client-side vitest. Runs in jsdom (see
    # packages/client/vitest.config.ts) so window-dispatching tests
    # like ws-invitation.test.ts actually execute. Was previously
    # absent from CI entirely — fake-green guard.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @borgee/client
      - run: pnpm --filter @borgee/client test

  go-test-race:
    # CI-SPLIT-RACE-COV: race-only job, no coverage. Pure data-race signal —
    # fail-fast for goroutine bugs without coverage's race-flake.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests with race detector (no coverage)
        # CI race budget: 180s 跟 go-test-race-heavy sub-job (line 76) byte-identical.
        # 真因 (#649 panic 真凿实): race detector ~3x slower + ubuntu CI runner cold-build
        # /JIT warmup + 738 api test cumulative + 5 background sweeper/monitor goroutine
        # per test (ThresholdMonitor / EventsArchive / EventsRetention / RetentionSweeper /
        # HeartbeatRetentionSweeper, 全 ctx-aware 真无 leak). 本地 race 12s, CI 慢 runner
        # 命中 120s 边界 panic. 调 180s 跟 heavy 对齐 50% headroom.
        # 反 mask cov: 阈值是 cov %, 不是 timeout — race regression 早期信号通过 cumulative
        # job time slope 监测 (CI runner 总时长), 不靠 timeout 抓.
        # 历史 TEST-FIX-3 立场 ③ 维持 120s 阻"全局 bump mask" — 但 #649 panic 凿实 race
        # 真测试 cumulative 已逼 120s 边界, 反信号 mask 真因 = budget 不足. 调 180s 是
        # giving real budget, 不是 mask race regression — race regression 仍由 stack
        # dump/data race 真信号抓 (panic 显示 race detector 触发还是 timeout 触发不同).
        run: cd packages/server-go && go test -tags sqlite_fts5 -timeout=180s -race ./...

  go-test-race-heavy:
    # TEST-FIX-3: race-heavy sub-job, 单独跑 `//go:build race_heavy` tag 文件
    # (TestClosedStoreInternalErrorBranches 11 sub-test, race-heavy serialize 长).
    # 跟主 go-test-race job 并行不互拖. timeout 180s (50% 余量, 不是 mask —
    # 真因 race-heavy sub-test 本质需更长预算, 隔离 budget 是诚实做法,
    # 不是吞下 timeout 阈值).
    #
    # 真因诊断 (#608 TEST-FIX-2 已修 goroutine leak; 主 race job 仍贴近 120s
    # 间歇性 flake 因 race-heavy sub-test 集中. 隔离后主路径稳定).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run race-heavy tests (build tag race_heavy)
        run: cd packages/server-go && go test -tags 'sqlite_fts5 race_heavy' -timeout=180s -race -run TestClosedStoreInternalErrorBranches ./internal/api/...

  go-test-cov:
    # CI-SPLIT-RACE-COV: coverage-only job, no race. Deterministic coverage
    # value — race detector affects goroutine scheduling, which makes some
    # defer/panic branches hit non-deterministically (e.g. ws/hub.go::
    # StartHeartbeat 33.3% no-race vs 58.3% with-race), bleeding into
    # coverage % flakes ±0.1%. Replaces the legacy `go-test` job; ruleset
    # required-checks should reference both `go-test-race` + `go-test-cov`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run tests + coverage analysis (haystack-derived tool)
        # TEST-FIX-3-COV: 切到 scripts/lib/coverage/ haystack-derived 工具
        # 替代既有 grep|awk 简陋 grep. 优点 (跟既有 137 行 main.go 同精神扩):
        #   - 4 阈值 (Func / Package / Print / Total) 比单 total 更细
        #   - CI mode (GitHub Actions error format)
        #   - ExcludePackages / ExcludeFiles / ExcludeFuncs (per-func 排除)
        #   - UncoveredLimit + AST analysis (精准定位 uncovered block)
        # 阈值: ThresholdTotal=85 / ThresholdFunc=50 / ThresholdPackage=70
        # (跟 #612 cov 真补 85.2% 对齐, 反 #610 84% drop). race_heavy build
        # tag 走 BuildTags env (跟 TEST-FIX-3 #610 race_heavy 立场承袭, 11
        # sub-test 走此 tag 包含覆盖). CI=true 自动触发 -race + GitHub
        # error format. FAIL_ON_CRITICAL_BLOCKS 默认关 (haystack AST 分析
        # 30+ CRITICAL uncovered block 一齐 fail 不现实, 留账 ramp).
        # 立场承袭: 不降 cov 阈值铁律 (no_lower_test_coverage). 实测 85.2%
        # ≥ 85% 不靠 flaky CI scheduler (deterministic 真补 + race_heavy tag).
        env:
          CI: "true"
          THRESHOLD_TOTAL: "85"
          THRESHOLD_FUNC: "50"
          THRESHOLD_PACKAGE: "70"
          THRESHOLD_PRINT: "85"
          BUILD_TAGS: "sqlite_fts5 race_heavy"
          COVERPROFILE: "coverage.out"
          FAIL_ON_CRITICAL_BLOCKS: "false"
          RACE_DETECTION: "false"
        run: cd packages/server-go && go run ./scripts/lib/coverage/

  bpp-envelope-lint:
    # BPP-1 (#274/#280) envelope CI lint — G2.6 真落.
    # Pins 5 invariants (byte-identical with RT-0 #237, direction lock
    # control 6 / data 3, frame whitelist closure, godoc anchor) +
    # reverse-grep guard against stray full-replay defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: cd packages/server-go && go mod download
      - name: Run BPP-1 envelope lint
        run: ./scripts/lint-bpp-envelope.sh

  e2e:
    # INFRA-2: Playwright dual-server smoke. Boots server-go (4901) + vite (5174)
    # via playwright.config webServer; smoke is 3 assertions (~5s) but chromium
    # install dominates (~1min). RT-0 / CM-onboarding / G2.4 will pile on here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borgee/e2e --filter @borgee/client
      - name: Install Playwright chromium
        run: pnpm --filter @borgee/e2e exec playwright install --with-deps chromium
      - name: Type-check client (vite dev needs tsc-clean code)
        run: pnpm --filter @borgee/client build
      - name: Pre-fetch server-go modules
        run: cd packages/server-go && go mod download
      - name: Run E2E
        run: pnpm --filter @borgee/e2e test
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

  hb20-ipc-prereq:
    # HB-2.0 prerequisite — IPC primitive smoke per OS (Linux UDS / macOS UDS
    # / Windows Named Pipe). Build-tag-per-platform; matrix runs each smoke
    # test on its native runner. Gates HB-2 v0(C) host-bridge daemon
    # (packages/borgee-helper/ Go cmd 真启 IPC server 反约束 build-tag drift).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: HB-2.0 IPC primitive smoke (build tag per OS)
        run: cd packages/server-go && go test ./internal/helper/...
