name: Release Borgee

# #993 #994 #995 rework: distribution went through `@codetreker/borgee-remote-agent`
# npm bundle + 4 platform subpackages (single `borgee` Go binary folded from
# 3 prior binaries). Triggers:
#   - Push of a tag matching `borgee-v*` (production release path).
#   - Manual `workflow_dispatch` (`version` input required) for dry-run /
#     staging publishes.
#
# What this workflow ships, per release:
#   1. Builds `borgee` Go binary for 4 platform targets (linux x64 + arm64,
#      darwin x64 + arm64; Windows remains intentionally out of scope —
#      track issue #659).
#   2. Publishes 4 platform subpackages
#      (@codetreker/borgee-remote-agent-<plat>-<arch>) carrying ONE file each
#      at `bin/borgee`.
#   3. Publishes the main `@codetreker/borgee-remote-agent` package with
#      optionalDependencies pinned to the platform subpackage versions.
#
# Required secrets (assumed to already exist; same posture as
# `publish-remote-agent.yml`):
#   - NPM_TRUSTED_CONN environment provides npm provenance / OIDC.

on:
  push:
    tags:
      - 'borgee-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp + publish (e.g. 0.1.0-dev). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF##*/}"
            VERSION="${REF#borgee-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "could not determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "resolved version: $VERSION"

  build-binaries:
    name: Build borgee (${{ matrix.platform }})
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - platform: linux-arm64
            # ubuntu-24.04-arm runner provides native aarch64; avoids CGO
            # cross-compile pain with mattn/go-sqlite3 (grants consumer).
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - platform: darwin-x64
            # macos-13 is the last Intel-native GitHub runner image; later
            # macOS images are Apple Silicon and would require osxcross to
            # build x86_64 darwin with CGO.
            runner: macos-13
            goos: darwin
            goarch: amd64
          - platform: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build borgee for ${{ matrix.platform }}
        working-directory: packages/borgee
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # CGO_ENABLED=1: grants consumer uses mattn/go-sqlite3, which is a
          # CGO binding. Using native per-platform runners (above) avoids the
          # cross-compile toolchain dance.
          CGO_ENABLED: '1'
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "bin/borgee-${{ matrix.platform }}" \
            ./cmd/borgee
      - uses: actions/upload-artifact@v4
        with:
          name: borgee-${{ matrix.platform }}
          path: packages/borgee/bin/borgee-${{ matrix.platform }}
          retention-days: 7

  publish-platform-packages:
    name: Publish ${{ matrix.platform }} subpackage
    needs: [resolve-version, build-binaries]
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    strategy:
      fail-fast: false
      matrix:
        platform: [linux-x64, linux-arm64, darwin-x64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: borgee-${{ matrix.platform }}
          path: /tmp/borgee-bin
      - name: Stage binary in subpackage
        working-directory: packages/remote-agent/platforms/${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p bin
          cp /tmp/borgee-bin/borgee-${{ matrix.platform }} bin/borgee
          chmod 0755 bin/borgee
          ls -la bin/
      - name: Stamp version
        working-directory: packages/remote-agent/platforms/${{ matrix.platform }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = v;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
      - name: Check if already published
        working-directory: packages/remote-agent/platforms/${{ matrix.platform }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VERSION" version 2>/dev/null; then
            echo "::notice::$PKG@$VERSION already published — skipping"
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          fi
      - name: Publish ${{ matrix.platform }} subpackage
        if: env.SKIP_PUBLISH != 'true'
        working-directory: packages/remote-agent/platforms/${{ matrix.platform }}
        run: npm publish --provenance --access public

  publish-main-package:
    name: Publish main package
    needs: [resolve-version, publish-platform-packages]
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/borgee-remote-agent
      - run: pnpm --filter @codetreker/borgee-remote-agent build
      - name: Stamp main package version + pin optionalDependencies
        working-directory: packages/remote-agent
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = v;
            p.optionalDependencies ||= {};
            for (const plat of ["linux-x64", "linux-arm64", "darwin-x64", "darwin-arm64"]) {
              p.optionalDependencies[`@codetreker/borgee-remote-agent-${plat}`] = v;
            }
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
      - name: Check if already published
        working-directory: packages/remote-agent
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @codetreker/borgee-remote-agent@$VERSION version 2>/dev/null; then
            echo "::notice::v$VERSION already published — skipping"
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          fi
      - name: Publish main package
        if: env.SKIP_PUBLISH != 'true'
        working-directory: packages/remote-agent
        run: npm publish --provenance --access public
