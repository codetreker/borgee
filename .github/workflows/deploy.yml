name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: default/borgee
  HARBOR_USER: ${{ vars.HARBOR_USER }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
      - run: pnpm install --frozen-lockfile --filter @borgee/client --filter borgee
      - run: pnpm --filter @borgee/client build
      - run: cd packages/server-go && go test -tags sqlite_fts5 ./... -count=1

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build tag
        id: tag
        run: echo "build_tag=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        run: echo '${{ secrets.HARBOR_API_TOKEN }}' | docker login ${{ env.REGISTRY }} -u '${{ env.HARBOR_USER }}' --password-stdin

      - name: Build and push
        # no-hardcoded-domain: VITE_AGENT_WS_SERVER baked at build time.
        # Staging and production use the same image: deploy-prod re-tags
        # build_tag as prod through the Harbor API below. Staging intentionally
        # uses the production WebSocket URL because it validates the exact
        # production artifact and the admin UI has no real users there. The
        # testing environment keeps its own build and URL in deploy-test.yml.
        run: |
          docker build \
            -f packages/server-go/Dockerfile \
            --build-arg VITE_AGENT_WS_SERVER=wss://borgee.codetrek.cn \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.build_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:staging

      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/dockers/borgee-staging
            # On the server, docker-compose.yml and .env are managed manually.
            # This workflow no longer writes docker-compose.override.yml.
            # Runtime variables such as CORS_ORIGIN, BORGEE_ADMIN_*, and
            # JWT_SECRET live in .env.
            docker compose pull
            docker compose up -d --force-recreate
            sleep 5
            curl -sf http://localhost:4901/ > /dev/null && echo "✅ Staging healthy" || (echo "❌ Staging unhealthy" && exit 1)
            # Verify container is fresh (uptime < 60s)
            UPTIME=$(docker inspect --format '{{.State.StartedAt}}' borgee-staging 2>/dev/null || echo "")
            if [ -n "$UPTIME" ]; then echo "Container started at: $UPTIME"; fi
            docker image prune -f

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Tag prod via Harbor API
        run: |
          curl -sf -u '${{ env.HARBOR_USER }}:${{ secrets.HARBOR_API_TOKEN }}' \
            -X DELETE 'https://${{ env.REGISTRY }}/api/v2.0/projects/default/repositories/borgee/artifacts/prod/tags/prod' || true
          curl -sf -u '${{ env.HARBOR_USER }}:${{ secrets.HARBOR_API_TOKEN }}' \
            -X POST 'https://${{ env.REGISTRY }}/api/v2.0/projects/default/repositories/borgee/artifacts/${{ needs.deploy-staging.outputs.build_tag }}/tags' \
            -H 'Content-Type: application/json' \
            -d '{"name":"prod"}'

      - name: Deploy production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/dockers/borgee
            # On the server, docker-compose.yml and .env are managed manually.
            # This workflow no longer writes docker-compose.override.yml.
            # Runtime variables such as CORS_ORIGIN, BORGEE_ADMIN_*, and
            # JWT_SECRET live in .env.
            docker compose pull
            docker compose up -d --force-recreate
            sleep 5
            curl -sf http://localhost:4900/ > /dev/null && echo "✅ Production healthy" || (echo "❌ Production unhealthy" && exit 1)
            # Verify container is fresh (uptime < 60s)
            UPTIME=$(docker inspect --format '{{.State.StartedAt}}' borgee 2>/dev/null || echo "")
            if [ -n "$UPTIME" ]; then echo "Container started at: $UPTIME"; fi
            docker image prune -f

      - name: Tag release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.deploy-staging.outputs.build_tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${tag}`,
              sha: context.sha
            });
            core.info(`Tagged: v${tag}`);
