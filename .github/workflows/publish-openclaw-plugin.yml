name: Publish OpenClaw Plugin

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/borgee-openclaw-plugin
      - run: pnpm --filter @codetreker/borgee-openclaw-plugin build
      - name: Check if already published
        working-directory: packages/plugins/openclaw
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if npm view @codetreker/borgee-openclaw-plugin@$VERSION version 2>/dev/null; then
            echo "::notice::v$VERSION already published — skipping"
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          fi
      - name: Publish
        if: env.SKIP_PUBLISH != 'true'
        working-directory: packages/plugins/openclaw
        run: npm publish --provenance --access public
