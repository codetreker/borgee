name: Release Helper

# #1003 — produce installable .deb + .pkg artifacts for borgee-helper so
# helper-side changes (#968 / #991 / etc.) can actually reach a user VM.
#
# Triggers:
#   - Push of a tag matching `borgee-helper-v*` (the production release path).
#   - Manual `workflow_dispatch` for staging / dry-run builds; the version
#     input must be supplied by the operator.
#
# Output: GitHub Release attached with:
#   - borgee-helper_<version>_amd64.deb
#   - borgee-helper_<version>_arm64.deb
#   - borgee-helper-<version>-darwin-universal.pkg
#   - SHA256SUMS
#
# Out of scope for this workflow:
#   - Apple notarization / Authenticode signing — keys + ID handling live in
#     the signed-manifest sibling (#997).
#   - host_manifest.go auto-update — also #997.

on:
  push:
    tags:
      - 'borgee-helper-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 0.1.0-dev). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - id: compute
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF##*/}"
            VERSION="${REF#borgee-helper-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "could not determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "resolved version: $VERSION"

  lint-nfpm-yaml:
    name: Lint nfpm.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.38.0
      - name: Dry-run nfpm config parse
        working-directory: packages/borgee-helper
        env:
          VERSION: 0.0.0-lint
          NFPM_ARCH: amd64
        run: |
          # We can't actually build the .deb here (no binaries yet) — but
          # nfpm errors out on bad YAML structure / unknown keys before it
          # tries to read source files, which is what we want to catch.
          set +e
          OUT=$(nfpm package --packager deb --target /tmp/lint.deb -f nfpm.yaml 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then
            echo "::notice::nfpm config parsed AND built — surprising but fine"
            exit 0
          fi
          # Acceptable failure: missing source binary. Everything else is a real config bug.
          if echo "$OUT" | grep -Eq "(matching files: lstat|no such file or directory|cannot find).*borgee-helper"; then
            echo "::notice::nfpm parsed config successfully (binary missing, expected at lint stage)"
            exit 0
          fi
          echo "::error::nfpm config failed to parse"
          exit 1

  build-linux:
    name: Build Linux ${{ matrix.goarch }} .deb
    needs: [resolve-version, lint-nfpm-yaml]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            apt_pkg: ''
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt_pkg: 'gcc-aarch64-linux-gnu'
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      NFPM_ARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install cross-compiler (if needed)
        if: matrix.apt_pkg != ''
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ matrix.apt_pkg }}
      - name: Build borgee-helper (CGO)
        working-directory: packages/borgee-helper
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper/borgee-helper ./cmd/borgee-helper
      - name: Build borgee-helper-claim
        working-directory: packages/borgee-helper
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper-claim/borgee-helper-claim ./cmd/borgee-helper-claim
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.38.0
      - name: Package .deb
        working-directory: packages/borgee-helper
        run: |
          mkdir -p ../../dist
          nfpm package \
            --packager deb \
            --target "../../dist/borgee-helper_${VERSION}_${NFPM_ARCH}.deb" \
            -f nfpm.yaml
          ls -la ../../dist/
      - name: Compute SHA256
        working-directory: dist
        run: |
          sha256sum "borgee-helper_${VERSION}_${NFPM_ARCH}.deb" > "borgee-helper_${VERSION}_${NFPM_ARCH}.deb.sha256"
          cat "borgee-helper_${VERSION}_${NFPM_ARCH}.deb.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: borgee-helper-linux-${{ matrix.goarch }}
          path: |
            dist/borgee-helper_${{ env.VERSION }}_${{ matrix.goarch }}.deb
            dist/borgee-helper_${{ env.VERSION }}_${{ matrix.goarch }}.deb.sha256
          retention-days: 30

  build-darwin:
    name: Build Darwin universal .pkg
    needs: [resolve-version]
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build borgee-helper amd64
        working-directory: packages/borgee-helper
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '1'
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper/borgee-helper-amd64 ./cmd/borgee-helper
      - name: Build borgee-helper arm64
        working-directory: packages/borgee-helper
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '1'
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper/borgee-helper-arm64 ./cmd/borgee-helper
      - name: lipo universal borgee-helper
        working-directory: packages/borgee-helper/cmd/borgee-helper
        run: |
          lipo -create \
            -output borgee-helper \
            borgee-helper-amd64 \
            borgee-helper-arm64
          file borgee-helper
      - name: Build borgee-helper-claim amd64
        working-directory: packages/borgee-helper
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper-claim/borgee-helper-claim-amd64 ./cmd/borgee-helper-claim
      - name: Build borgee-helper-claim arm64
        working-directory: packages/borgee-helper
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags='-s -w' -o ./cmd/borgee-helper-claim/borgee-helper-claim-arm64 ./cmd/borgee-helper-claim
      - name: lipo universal borgee-helper-claim
        working-directory: packages/borgee-helper/cmd/borgee-helper-claim
        run: |
          lipo -create \
            -output borgee-helper-claim \
            borgee-helper-claim-amd64 \
            borgee-helper-claim-arm64
          file borgee-helper-claim
      - name: Build .pkg
        run: |
          mkdir -p dist
          bash packages/borgee-helper/install/pkg/build-pkg.sh "$VERSION" "$(pwd)/dist"
          ls -la dist/
      - name: Compute SHA256
        working-directory: dist
        run: |
          shasum -a 256 "borgee-helper-${VERSION}-darwin-universal.pkg" > "borgee-helper-${VERSION}-darwin-universal.pkg.sha256"
          cat "borgee-helper-${VERSION}-darwin-universal.pkg.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: borgee-helper-darwin-universal
          path: |
            dist/borgee-helper-${{ env.VERSION }}-darwin-universal.pkg
            dist/borgee-helper-${{ env.VERSION }}-darwin-universal.pkg.sha256
          retention-days: 30

  release:
    name: GitHub Release
    needs: [resolve-version, build-linux, build-darwin]
    if: startsWith(github.ref, 'refs/tags/borgee-helper-v')
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combine SHA256SUMS
        working-directory: dist
        run: |
          ls -la
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "borgee-helper-v${VERSION}" \
            --title "borgee-helper v${VERSION}" \
            --notes "Borgee Helper installable artifacts. See PACKAGING.md for install instructions. Apple notarization + signed manifest are tracked separately in #997." \
            dist/borgee-helper_${VERSION}_amd64.deb \
            dist/borgee-helper_${VERSION}_arm64.deb \
            dist/borgee-helper-${VERSION}-darwin-universal.pkg \
            dist/SHA256SUMS
