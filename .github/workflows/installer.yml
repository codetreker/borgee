name: HB-1B Installer Build Matrix

# HB-1B-INSTALLER spec §1 #2 — cross-platform installer build matrix.
# Linux .deb + macOS .pkg cross-compile + GitHub artifact upload.
# Windows remains a v2 follow-up because notarization and Authenticode require
# external setup.
#
# fail-fast: false matches the HB-2.0 #605 IPC matrix: one platform failure
# should not cancel the other platform builds.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/borgee-installer/**'
      - '.github/workflows/installer.yml'
  workflow_dispatch:

jobs:
  build-installer:
    name: build-installer-${{ matrix.goos }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cmd: borgee-installer-linux
            artifact: borgee-installer-linux-amd64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cmd: borgee-installer-darwin
            artifact: borgee-installer-darwin-amd64
          # windows: v2 follow-up (notarization / Authenticode external setup).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build ${{ matrix.cmd }}
        working-directory: packages/borgee-installer
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags='-s -w' -o ../../dist/${{ matrix.artifact }} ./cmd/${{ matrix.cmd }}
      - name: Test installer module
        working-directory: packages/borgee-installer
        run: go test -timeout=60s ./...
      - name: Compute SHA256
        run: |
          cd dist
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          cat ${{ matrix.artifact }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          retention-days: 30
