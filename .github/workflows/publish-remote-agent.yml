name: Publish Remote Agent

# Single publish workflow for `@codetreker/borgee-remote-agent`.
#
# chore/collapse-npm (2026-05-20) collapsed the prior `release-borgee.yml` +
# 4 platform subpackages into ONE npm package carrying all 4 platform
# binaries in its tarball under `bin/platforms/<plat>-<arch>/borgee`.
#
# Triggers:
#   - Push of a tag matching `borgee-v*` (production release path, e.g.
#     `borgee-v0.1.3`). Version is parsed from the tag.
#   - Manual `workflow_dispatch` — optional `version` input (defaults to
#     the committed `packages/remote-agent/package.json` version).
#
# Required secrets / environment:
#   - `NPM_TRUSTED_CONN` environment provides npm provenance / OIDC trusted
#     publish (same posture as `publish-openclaw-plugin.yml`).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (defaults to packages/remote-agent/package.json version)'
        required: false
        type: string
  push:
    tags:
      - 'borgee-v*'

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF##*/}"
            VERSION="${REF#borgee-v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./packages/remote-agent/package.json').version")
          fi
          if [ -z "$VERSION" ]; then
            echo "could not determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "resolved version: $VERSION"

  build-binaries:
    name: Build borgee (${{ matrix.platform }}-${{ matrix.arch }})
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - platform: linux
            arch: arm64
            # ubuntu-24.04-arm provides native aarch64; avoids CGO
            # cross-compile pain with mattn/go-sqlite3 (grants consumer).
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - platform: darwin
            arch: x64
            # macos-13 is the last Intel-native GitHub runner image; later
            # macOS images are Apple Silicon.
            runner: macos-13
            goos: darwin
            goarch: amd64
          - platform: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build borgee binary
        working-directory: packages/borgee
        env:
          # CGO_ENABLED=1: grants consumer uses mattn/go-sqlite3. Native
          # per-platform runners avoid the cross-compile toolchain dance.
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "/tmp/borgee-${{ matrix.platform }}-${{ matrix.arch }}" \
            ./cmd/borgee
          chmod 0755 "/tmp/borgee-${{ matrix.platform }}-${{ matrix.arch }}"
          ls -la "/tmp/borgee-${{ matrix.platform }}-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: borgee-${{ matrix.platform }}-${{ matrix.arch }}
          path: /tmp/borgee-${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 7

  publish:
    name: Publish main package
    needs: [resolve-version, build-binaries]
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter @codetreker/borgee-remote-agent
      - run: pnpm --filter @codetreker/borgee-remote-agent build
      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: /tmp/binaries
      - name: Stage binaries into bin/platforms/
        working-directory: packages/remote-agent
        run: |
          set -euo pipefail
          # download-artifact lays out /tmp/binaries/borgee-<plat>-<arch>/borgee-<plat>-<arch>
          # Reshape into packages/remote-agent/bin/platforms/<plat>-<arch>/borgee
          mkdir -p bin/platforms
          for plat in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            src="/tmp/binaries/borgee-${plat}/borgee-${plat}"
            dst_dir="bin/platforms/${plat}"
            if [ ! -f "$src" ]; then
              echo "FAIL: missing artifact $src" >&2
              exit 1
            fi
            mkdir -p "$dst_dir"
            cp "$src" "$dst_dir/borgee"
            chmod 0755 "$dst_dir/borgee"
          done
          # Sanity: exactly 4 platform binaries staged.
          count=$(ls bin/platforms | wc -l | tr -d ' ')
          if [ "$count" != "4" ]; then
            echo "FAIL: expected 4 platform binaries, got $count" >&2
            ls -la bin/platforms
            exit 1
          fi
          ls -la bin/platforms
          du -sh bin/platforms
      - name: Stamp version
        working-directory: packages/remote-agent
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = v;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
          node -p "require('./package.json').version"
      - name: Check if already published
        id: check
        working-directory: packages/remote-agent
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@codetreker/borgee-remote-agent@$VERSION" version 2>/dev/null; then
            echo "::notice::v$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/remote-agent
        run: npm publish --provenance --access public
