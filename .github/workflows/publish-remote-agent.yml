name: Publish Remote Agent

# Single publish workflow for `@codetreker/borgee-remote-agent`.
#
# chore/collapse-npm (2026-05-20) collapsed the prior `release-borgee.yml` +
# 4 platform subpackages into ONE npm package carrying all 4 platform
# binaries in its tarball under `bin/platforms/<plat>-<arch>/borgee`.
#
# Triggers:
#   - Push of a tag matching `borgee-v*` (production release path, e.g.
#     `borgee-v0.1.3`). Version is parsed from the tag.
#   - Manual `workflow_dispatch` — optional `version` input (defaults to
#     the committed `packages/borgee/package.json` version).
#
# Required secrets / environment:
#   - `NPM_TRUSTED_CONN` environment provides npm provenance / OIDC trusted
#     publish (same posture as `publish-openclaw-plugin.yml`).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (defaults to packages/borgee/package.json version)'
        required: false
        type: string
  push:
    tags:
      - 'borgee-v*'

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF##*/}"
            VERSION="${REF#borgee-v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./packages/borgee/package.json').version")
          fi
          if [ -z "$VERSION" ]; then
            echo "could not determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "resolved version: $VERSION"

  build-binaries:
    name: Build borgee binaries (4 platforms, CGO_ENABLED=0)
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
      - name: Cross-compile all 4 platforms
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: bash scripts/build-borgee-binaries.sh
      - uses: actions/upload-artifact@v4
        with:
          name: borgee-binaries
          path: packages/borgee/bin/platforms/
          retention-days: 7

  publish:
    name: Publish main package
    needs: [resolve-version, build-binaries]
    runs-on: ubuntu-latest
    environment: NPM_TRUSTED_CONN
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile --filter ./packages/borgee
      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          name: borgee-binaries
          path: packages/borgee/bin/platforms/
      - name: Stamp version
        working-directory: packages/borgee
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = v;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
          node -p "require('./package.json').version"
      - name: Check if already published
        id: check
        working-directory: packages/borgee
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@codetreker/borgee-remote-agent@$VERSION" version 2>/dev/null; then
            echo "::notice::v$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/borgee
        run: npm publish --provenance --access public
